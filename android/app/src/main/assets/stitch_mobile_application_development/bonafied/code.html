<body class="bg-background text-on-background min-h-screen flex flex-col pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline h-touch-target flex justify-between items-center px-container-margin">

</div>
<div class="w-10 h-10 rounded-full bg-primary-container overflow-hidden border-2 border-surface-variant">
<img class="w-full h-full object-cover" data-alt="A professional close-up studio portrait of a young Indian male student with short dark hair, wearing a clean white shirt, against a soft neutral background. The lighting is bright and professional, suggesting a formal university identity photograph, with a modern, high-quality aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCp9lPjiPqBLmdIPav65BJGHDcEcJq6XRHBI2KtOFeCBNl6dzyWwKpRTcgKY3dN6wHJ9-juYeK8ZYrgJLxjhnVzxOhcmAoxkhfVkB19w7dvIxX9q8VZoi4WMdxmpsrqpPg_ruknRlA-lNSE5N3mCZJk4s8v2hISPMTreMAgtw3CAT509FEdj0ZjdUf_A4JniALq3s9Ef1qOvc3qpMNfIbyM4OWBwGpvoA7B-EWG5Bts-UJME0scvdnD"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-margin pt-6 max-w-2xl mx-auto w-full">
<!-- Page Header -->
<div class="mb-8">
<h1 class="font-headline-md text-headline-md text-on-surface mb-1">Request Bonafide Certificate</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Submit a request for an official hostel bonafide certificate.</p>
</div>
<form class="space-y-section-gap" id="bonafideForm">
<!-- Section 1: Student Information -->
<section class="form-card bg-surface-container-lowest p-card-padding rounded-xl">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="badge">badge</span>
<h2 class="font-label-lg text-label-lg uppercase tracking-wider text-on-surface-variant">Student Information</h2>
</div>
<div class="grid grid-cols-1 gap-4">
<div class="bg-surface-container-low p-3 rounded-lg border border-outline-variant/30">
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Full Name</label>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">Aditya Sharma</p>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-3 rounded-lg border border-outline-variant/30">
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">UID</label>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">20BCS1024</p>
</div>
<div class="bg-surface-container-low p-3 rounded-lg border border-outline-variant/30">
<label class="font-label-md text-label-md text-on-surface-variant block mb-1">Department</label>
<p class="font-body-lg text-body-lg text-on-surface font-semibold">Computer Science</p>
</div>
</div>
</div>
</section>
<!-- Section 2: Request Details -->
<section class="form-card bg-surface-container-lowest p-card-padding rounded-xl">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="description">description</span>
<h2 class="font-label-lg text-label-lg uppercase tracking-wider text-on-surface-variant">Request Details</h2>
</div>
<div class="space-y-4">
<div>
<label class="font-label-lg text-label-lg text-on-surface-variant block mb-2" for="purpose">Purpose of Certificate</label>
<select class="custom-select w-full h-touch-target rounded-lg border-outline-variant bg-surface focus:ring-2 focus:ring-primary focus:border-primary text-body-lg font-body-lg px-4 transition-all" id="purpose">
<option disabled="" selected="" value="">Select Purpose</option>
<option value="bank">Bank Account Opening</option>
<option value="passport">Passport Application</option>
<option value="internship">Internship</option>
<option value="other">Other</option>
</select>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="font-label-lg text-label-lg text-on-surface-variant block mb-2" for="academic_year">Academic Year</label>
<select class="custom-select w-full h-touch-target rounded-lg border-outline-variant bg-surface focus:ring-2 focus:ring-primary focus:border-primary text-body-lg font-body-lg px-4 transition-all" id="academic_year">
<option value="2025-26">2025-26</option>
<option value="2024-25">2024-25</option>
</select>
</div>
<div>
<label class="font-label-lg text-label-lg text-on-surface-variant block mb-2" for="semester">Semester</label>
<select class="custom-select w-full h-touch-target rounded-lg border-outline-variant bg-surface focus:ring-2 focus:ring-primary focus:border-primary text-body-lg font-body-lg px-4 transition-all" id="semester">
<option value="5">Semester 5</option>
<option value="6">Semester 6</option>
</select>
</div>
</div>
</div>
</section>

<section class="form-card bg-surface-container-lowest p-card-padding rounded-xl">

<span class="material-symbols-outlined text-primary text-[20px]" data-icon="chat_bubble">chat_bubble</span>

</div>

<textarea class="w-full rounded-lg border-outline-variant bg-surface focus:ring-2 focus:ring-primary focus:border-primary text-body-lg font-body-lg p-4 transition-all resize-none" id="comments" placeholder="Enter any specific details or urgency reasons..." rows="3"></textarea>
</div>
</section>
<!-- Primary Action Button -->
<div class="pt-4 px-4 pb-12">
<button class="w-full h-12 bg-primary text-on-primary rounded-xl font-headline-sm text-headline-sm shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2" type="submit">
                    Submit Request
                    <span class="material-symbols-outlined" data-icon="send">send</span>
</button>
<p class="mt-4 text-center text-on-surface-variant font-label-md text-label-md">Typical processing time: 2-3 working days.</p>
</div>
</form>
</main>
<!-- BottomNavBar -->

<script>
        // Micro-interaction for form submission
        document.getElementById('bonafideForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Loading state
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Processing...
            `;
            btn.disabled = true;

            // Mock success timeout
            setTimeout(() => {
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                btn.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    Request Submitted
                `;
                
                // Reset form or redirect logic would go here
                setTimeout(() => {
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    document.getElementById('bonafideForm').reset();
                }, 3000);
            }, 1500);
        });

        // Add subtle hover effects to nav items
        document.querySelectorAll('nav > div').forEach(item => {
            item.addEventListener('click', () => {
                // Haptic feel
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });
    </script>
